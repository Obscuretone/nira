{% extends "base.html" %}
{% from "macros.html" import rich_editor %}

{% block title %}Create Ticket{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <p class="text-uppercase text-body-secondary small mb-1">New Ticket</p>
    <h1 class="h2 mb-0">Create Ticket</h1>
  </div>
  <a class="btn btn-outline-secondary" href="/">Back to Tickets</a>
</div>
<form method="post" action="/tickets" class="row g-4">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label" for="title">Title</label>
          <input class="form-control" id="title" name="title" required>
        </div>
        <h2 class="h5 mb-3">Body</h2>
        {{ rich_editor("body_md", height_px=380) }}
      </div>
    </div>
  </div>
  <div class="col-lg-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label" for="project_display">Ticket Prefix</label>
          <input class="form-control" id="project_display" value="{{ default_project }}-" readonly>
          <input type="hidden" name="project" value="{{ default_project }}">
        </div>
        <div class="mb-3">
          <label class="form-label" for="labels">Labels</label>
          <input class="form-control" id="labels" name="labels" placeholder="bug, UI, v1.0">
        </div>
        <div class="mb-3">
          <label class="form-label" for="due_date">Due Date</label>
          <input type="date" class="form-control" id="due_date" name="due_date">
        </div>
        <div class="mb-3">
          <label class="form-label" for="parent">Parent Ticket (optional)</label>
          <input class="form-control" id="parent" name="parent" placeholder="EMH-1" value="{{ parent_id or '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label" for="source">Source</label>
          <input class="form-control" id="source" name="source" placeholder="why this ticket exists">
        </div>
        <div class="mb-3">
          <label class="form-label" for="type">Type</label>
          <select class="form-select" id="type" name="type">
            {% for value, label in ticket_type_options -%}
            <option value="{{ value }}"{% if value == "task" %} selected{% endif %}>{{ label }}</option>
            {% endfor -%}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label" for="priority">Priority</label>
          <select class="form-select" id="priority" name="priority">
            {% for value, label in priority_options -%}
            <option value="{{ value }}"{% if value == "medium" %} selected{% endif %}>{{ label }}</option>
            {% endfor -%}
          </select>
        </div>
        <button class="btn btn-primary w-100" type="submit">Create Ticket</button>
      </div>
    </div>
  </div>
</form>
{% endblock %}
