<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ title }}{% endblock %} · Nira</title>
    <link rel="icon" type="image/png" href="{{ favicon_url }}">
    <link href="{{ bootstrap_css }}" rel="stylesheet" integrity="{{ bootstrap_css_integrity }}" crossorigin="anonymous">
    <link href="{{ toast_ui_editor_css }}" rel="stylesheet">
    <link href="{{ toast_ui_editor_dark_css }}" rel="stylesheet">
    <style>
      :root {
        --nira-bg-gradient-light: radial-gradient(circle at top left, rgba(13, 110, 253, 0.08), transparent 35%), linear-gradient(180deg, #f8f9fa 0%, #eef1f4 100%);
        --nira-bg-gradient-dark: radial-gradient(circle at top left, rgba(13, 110, 253, 0.15), transparent 35%), linear-gradient(180deg, #212529 0%, #1a1d20 100%);
        --nira-header-bg-light: rgba(255, 255, 255, 0.78);
        --nira-header-bg-dark: rgba(33, 37, 41, 0.78);
      }
      body {
        background: var(--nira-bg-gradient-light);
        min-height: 100vh;
      }
      [data-bs-theme="dark"] body {
        background: var(--nira-bg-gradient-dark);
      }
      .brand-shell {
        background: var(--nira-header-bg-light);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      }
      [data-bs-theme="dark"] .brand-shell {
        background: var(--nira-header-bg-dark);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .brand-nav {
        gap: 0.75rem 1.25rem;
      }
      .brand-mark {
        height: 2.75rem;
        width: auto;
      }
      .brand-wordmark {
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: 0.24rem;
        color: var(--bs-body-color);
      }
      .page-shell {
        padding-block: 2.5rem 4rem;
      }
      .markdown-output h1,
      .markdown-output h2,
      .markdown-output h3 {
        margin-top: 1rem;
        margin-bottom: 0.75rem;
      }
      .markdown-output pre {
        background: var(--bs-dark);
        color: var(--bs-light);
        padding: 1rem;
        border-radius: 0.75rem;
        overflow-x: auto;
      }
      .rich-editor-source {
        min-height: 12rem;
      }
      .toastui-editor-defaultUI {
        border-radius: 0.75rem;
        border-color: var(--bs-border-color);
        background-color: var(--bs-body-bg);
      }
      .toastui-editor-toolbar {
        border-top-left-radius: 0.75rem;
        border-top-right-radius: 0.75rem;
        background-color: var(--bs-tertiary-bg);
      }
      /* Dark mode overrides for toast UI editor */
      [data-bs-theme="dark"] .toastui-editor-defaultUI {
        color: var(--bs-body-color);
      }
      [data-bs-theme="dark"] .toastui-editor-defaultUI .ProseMirror {
        color: var(--bs-body-color);
      }
      [data-bs-theme="dark"] .toastui-editor-toolbar,
      [data-bs-theme="dark"] .toastui-editor-defaultUI-toolbar {
        background-color: var(--bs-tertiary-bg);
        border-color: var(--bs-border-color);
      }
      [data-bs-theme="dark"] .toastui-editor-popup {
        background-color: var(--bs-body-bg);
        border-color: var(--bs-border-color);
      }
      [data-bs-theme="dark"] .toastui-editor-dropdown-toolbar {
        background-color: var(--bs-body-bg);
        border-color: var(--bs-border-color);
      }
      .theme-icon-active {
        width: 1em;
        height: 1em;
        vertical-align: -0.125em;
      }
      .kanban-card {
        cursor: grab;
      }
      .kanban-card:active {
        cursor: grabbing;
      }
      .label-pill {
        display: inline-flex;
        align-items: center;
        padding: 0.15rem 0.5rem;
        border-radius: 50rem;
        background-color: var(--bs-primary-bg-subtle);
        color: var(--bs-primary-text-emphasis);
        font-size: 0.75rem;
        font-weight: 600;
        margin-right: 0.25rem;
        margin-bottom: 0.25rem;
        border: 1px solid var(--bs-primary-border-subtle);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s ease-in-out;
      }
      .label-pill:hover {
        background-color: var(--bs-primary);
        color: #fff;
      }
      .label-pill-remove {
        margin-left: 0.35rem;
        cursor: pointer;
        opacity: 0.6;
      }
      .label-pill-remove:hover {
        opacity: 1;
      }
      .label-input-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        padding: 0.375rem 0.75rem;
        background-color: var(--bs-body-bg);
        border: var(--bs-border-width) solid var(--bs-border-color);
        border-radius: var(--bs-border-radius);
        min-height: 38px;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
      }
      .label-input-container:focus-within {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 .25rem rgba(13,110,253,.25);
      }
      .label-hidden-input {
        border: none;
        outline: none;
        background: transparent;
        color: var(--bs-body-color);
        flex-grow: 1;
        min-width: 60px;
        font-size: 1rem;
        padding: 0;
      }
      a.label-pill-link:hover {
        background-color: var(--bs-secondary-bg) !important;
      }
    </style>
    <script>
      // Load theme early from server-side preference
      (function() {
        const theme = "{{ current_theme }}";
        const isDark = (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) || theme === 'dark';
        document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <header class="brand-shell">
      <div class="container py-3 d-flex flex-wrap align-items-center gap-3">
        <a class="d-inline-flex align-items-center gap-3 text-decoration-none me-auto" href="/">
          <img class="brand-mark" src="{{ brand_logo_url }}" alt="Nira logo">
          <span class="brand-wordmark">NIRA</span>
        </a>
        
        <form class="d-flex order-3 order-lg-2 w-100 w-lg-auto flex-grow-1 mx-lg-3" style="max-width: 400px;" action="/" method="get" id="global-search-form" hx-get="/" hx-target="body" hx-push-url="true">
          <input 
            class="form-control form-control-sm" 
            type="search" 
            id="global-search-input"
            name="search" 
            placeholder="Search..." 
            aria-label="Search" 
            value="{{ search_query or '' }}"
            hx-get="/"
            hx-trigger="keyup changed delay:500ms"
            hx-target="body"
            hx-push-url="true"
            hx-include="#filter-form"
          >
        </form>

        <nav class="d-flex flex-wrap align-items-center brand-nav order-2 order-lg-3 gap-3">
          <a class="link-body-emphasis text-decoration-none fw-semibold" href="/" title="Go to List (L or /)">Ticket List</a>
          <a class="link-body-emphasis text-decoration-none fw-semibold" href="/dashboard" title="Go to Dashboard (D)">Dashboard</a>
          <a class="link-body-emphasis text-decoration-none fw-semibold" href="/board" title="Go to Kanban Board (B)">Board</a>
          <a class="link-body-emphasis text-decoration-none fw-semibold" href="/tickets/new" title="Create a new ticket (C)">Create Ticket</a>
          <a class="link-body-emphasis text-decoration-none fw-semibold" href="/settings">Settings</a>
          <div class="dropdown ms-1">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle d-flex align-items-center" id="bd-theme" type="button" aria-expanded="false" data-bs-toggle="dropdown" aria-label="Toggle theme (auto)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-circle-half theme-icon-active" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z"/></svg>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="bd-theme-text">
              <li>
                <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="light" aria-pressed="false" hx-post="/settings" hx-vals='{"theme": "light"}' hx-swap="none">
                  Light
                </button>
              </li>
              <li>
                <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="dark" aria-pressed="false" hx-post="/settings" hx-vals='{"theme": "dark"}' hx-swap="none">
                  Dark
                </button>
              </li>
              <li>
                <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="auto" aria-pressed="true" hx-post="/settings" hx-vals='{"theme": "auto"}' hx-swap="none">
                  Auto
                </button>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>
    <main class="container page-shell">
      {% block content %}{{ content | safe }}{% endblock %}
    </main>
    <script src="{{ bootstrap_js }}" integrity="{{ bootstrap_js_integrity }}" crossorigin="anonymous"></script>
    <script src="{{ toast_ui_editor_js }}"></script>
    <script src="{{ htmx_js }}" integrity="{{ htmx_js_integrity }}" crossorigin="anonymous"></script>
    <script src="{{ sortable_js }}"></script>
    <script>
      const statusSelectClasses = {
        open: "form-select form-select-lg fw-semibold border-secondary bg-secondary-subtle text-secondary-emphasis",
        in_progress: "form-select form-select-lg fw-semibold border-primary bg-primary-subtle text-primary-emphasis",
        closed: "form-select form-select-lg fw-semibold border-success bg-success-subtle text-success-emphasis",
      };

      const getStoredTheme = () => localStorage.getItem('theme')
      const setStoredTheme = theme => localStorage.setItem('theme', theme)
      
      const getPreferredTheme = () => {
        const storedTheme = getStoredTheme()
        if (storedTheme) {
          return storedTheme
        }
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      }

      const setTheme = theme => {
        const isDark = (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) || theme === 'dark';
        document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
        
        // Update any rich editors on the page
        document.querySelectorAll(".rich-editor-shell").forEach((shell) => {
           if (shell._editorInstance && typeof shell._editorInstance.changeTheme === 'function') {
               shell._editorInstance.changeTheme(isDark ? 'dark' : 'light');
           }
        });
      }

      const showActiveTheme = (theme, focus = false) => {
        const themeSwitcher = document.querySelector('#bd-theme')
        if (!themeSwitcher) return
        const btnToActive = document.querySelector(`[data-bs-theme-value="${theme}"]`)
        document.querySelectorAll('[data-bs-theme-value]').forEach(element => {
          element.classList.remove('active')
          element.setAttribute('aria-pressed', 'false')
        })
        if (btnToActive) {
          btnToActive.classList.add('active')
          btnToActive.setAttribute('aria-pressed', 'true')
        }
        if (focus) {
          themeSwitcher.focus()
        }
      }

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        const currentTheme = document.querySelector('[data-bs-theme-value].active')?.dataset.bsThemeValue || 'auto';
        if (currentTheme === 'auto') {
          setTheme('auto')
        }
      })

      document.querySelectorAll('[data-bs-theme-value]').forEach(toggle => {
        toggle.addEventListener('click', () => {
          const theme = toggle.getAttribute('data-bs-theme-value')
          setTheme(theme)
          showActiveTheme(theme, true)
        })
      })

      // Use the theme provided by the server
      const initialTheme = "{{ current_theme }}";
      setTheme(initialTheme)
      showActiveTheme(initialTheme)

      function initNiraComponents(root) {
        root.querySelectorAll(".rich-editor-shell").forEach((shell) => {
          if (shell.dataset.editorInitialized) return;
          shell.dataset.editorInitialized = "true";

          const source = shell.querySelector(".rich-editor-source");
          const target = shell.querySelector(".rich-editor-target");
          const form = shell.closest("form");
          if (!window.toastui || !window.toastui.Editor) {
            return;
          }

          const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
          
          const editor = new window.toastui.Editor({
            el: target,
            height: shell.dataset.editorHeight || "320px",
            initialEditType: "wysiwyg",
            initialValue: source.value,
            previewStyle: "vertical",
            usageStatistics: false,
            theme: isDark ? 'dark' : 'light',
          });

          // We need to keep a reference to update it when theme changes
          shell._editorInstance = editor;

          target.classList.remove("d-none");
          source.classList.add("d-none");

          const syncEditor = () => {
            source.value = editor.getMarkdown();
          };

          form?.addEventListener("submit", syncEditor);
        });

        root.querySelectorAll("[data-status-select]").forEach((select) => {
          if (select.dataset.statusInitialized) return;
          select.dataset.statusInitialized = "true";

          const applyStatusClass = () => {
            select.className = statusSelectClasses[select.value] || statusSelectClasses.open;
          };

          applyStatusClass();
          select.addEventListener("change", applyStatusClass);
        });

        root.querySelectorAll("[data-auto-submit]").forEach((input) => {
          if (input.dataset.autoSubmitInitialized) return;
          input.dataset.autoSubmitInitialized = "true";

          input.addEventListener("change", () => {
            input.form?.requestSubmit();
          });
        });

        // Kanban board drag and drop
        root.querySelectorAll(".kanban-column").forEach((column) => {
          if (!window.Sortable || column.dataset.sortableInitialized) return;
          column.dataset.sortableInitialized = "true";
          
          new Sortable(column, {
            group: "kanban",
            animation: 150,
            ghostClass: "bg-primary-subtle",
            filter: "a, button, input",
            preventOnFilter: false,
            onEnd: (evt) => {
              const ticketId = evt.item.dataset.ticketId;
              const newStatus = evt.to.dataset.status;
              if (evt.from !== evt.to) {
                // Trigger HTMX request to update status
                htmx.ajax('POST', `/tickets/${ticketId}/edit`, {
                  values: { status: newStatus },
                  target: 'body'
                });
              }
            }
          });
        });

        // Label interactive pills
        root.querySelectorAll('.label-input-container').forEach(container => {
          if (container.dataset.pillsInitialized) return;
          container.dataset.pillsInitialized = "true";

          const input = container.querySelector('.label-hidden-input');
          const hiddenRealInput = container.querySelector('.label-real-input');
          
          function updateRealInput() {
              const labels = Array.from(container.querySelectorAll('.label-pill span'))
                  .map(span => span.textContent.trim());
              hiddenRealInput.value = labels.join(', ');
              // Trigger change event for HTMX auto-save if applicable
              hiddenRealInput.dispatchEvent(new Event('change', { bubbles: true }));
          }

          function createPill(text) {
              const pill = document.createElement('div');
              pill.className = 'label-pill mb-0';
              
              const span = document.createElement('span');
              span.textContent = text;
              
              const removeBtn = document.createElement('i');
              removeBtn.className = 'label-pill-remove';
              removeBtn.innerHTML = '&times;';
              removeBtn.onclick = (e) => {
                  e.preventDefault();
                  pill.remove();
                  updateRealInput();
                  input.focus();
              };
              
              pill.appendChild(span);
              pill.appendChild(removeBtn);
              
              // Insert before the input field
              container.insertBefore(pill, input);
          }

          // Initialize existing labels
          if (hiddenRealInput.value) {
              hiddenRealInput.value.split(',').forEach(lbl => {
                  const trimmed = lbl.trim();
                  if (trimmed) createPill(trimmed);
              });
          }

          input.addEventListener('keydown', (e) => {
              if (e.key === ',' || e.key === 'Enter') {
                  e.preventDefault();
                  const text = input.value.trim().replace(/,/g, '');
                  if (text) {
                      createPill(text);
                      updateRealInput();
                      input.value = '';
                  }
              } else if (e.key === 'Backspace' && input.value === '') {
                  // Remove the last pill if backspace is pressed on empty input
                  const pills = container.querySelectorAll('.label-pill');
                  if (pills.length > 0) {
                      pills[pills.length - 1].remove();
                      updateRealInput();
                  }
              }
          });

          // Focus the input when clicking anywhere in the container
          container.addEventListener('click', (e) => {
              if (e.target === container) {
                  input.focus();
              }
          });
        });
      }

      // Initialize on first load
      initNiraComponents(document);

      // Re-initialize after HTMX swaps
      document.body.addEventListener('htmx:load', function(evt) {
          initNiraComponents(evt.detail.elt);
      });

      // Global handler for ticket typeahead selection
      window.selectTicket = function(button, ticketId) {
          const container = button.closest('.ticket-typeahead-container');
          if (!container) return;
          const input = container.querySelector('.typeahead-input');
          if (!input) return;
          
          input.value = ticketId;
          // Trigger change so parent HTMX forms know about the update
          input.dispatchEvent(new Event('change', { bubbles: true }));
          
          // Optionally auto-submit if part of a specific form (like Add Related)
          if (input.hasAttribute('data-auto-submit-parent')) {
              input.closest('form').requestSubmit();
          }
      };

      // Global keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        // Ignore if user is typing in an input, textarea, or contenteditable element
        const activeElement = document.activeElement;
        const isInput = activeElement.tagName === 'INPUT' || 
                        activeElement.tagName === 'TEXTAREA' || 
                        activeElement.tagName === 'SELECT' ||
                        activeElement.isContentEditable;
                        
        if (isInput) {
            if (e.key === 'Escape') {
                activeElement.blur();
            }
            return;
        }

        // Shortcuts
        const key = e.key.toLowerCase();
        if (key === 'c') {
            e.preventDefault();
            htmx.ajax('GET', '/tickets/new', {target: 'body', pushUrl: true});
        } else if (key === 'b') {
            e.preventDefault();
            htmx.ajax('GET', '/board', {target: 'body', pushUrl: true});
        } else if (key === 'd') {
            e.preventDefault();
            htmx.ajax('GET', '/dashboard', {target: 'body', pushUrl: true});
        } else if (key === 'l') {
            e.preventDefault();
            htmx.ajax('GET', '/', {target: 'body', pushUrl: true});
        } else if (key === 'f' || key === '/') {
            e.preventDefault();
            const searchInput = document.getElementById('global-search-input');
            if (searchInput) {
                searchInput.focus();
                // Optionally select all text
                searchInput.select();
            }
        }
      });

    </script>
  </body>
</html>
