<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h2 class="h5 mb-3">{{ _("Related") }}</h2>
    <form
      method="post"
      action="/tickets/{{ ticket.id }}/link"
      class="mb-3"
      hx-post="/tickets/{{ ticket.id }}/link"
      hx-target="body"
    >
      <div class="input-group">
        {{ ticket_typeahead("other_ticket_id", "other_ticket_id", "", placeholder=_("Search for ticket to link..."), exclude_id=ticket.id) }}
        <button class="btn btn-outline-dark" type="submit">{{ _("Link") }}</button>
      </div>
    </form>
    <ul class="list-group list-group-flush">
      {% for item in related %}
      <li class="list-group-item d-flex justify-content-between align-items-center gap-3">
        <div class="d-flex align-items-center gap-2 overflow-hidden">
          <a class="link-body-emphasis fw-semibold text-nowrap" href="/tickets/{{ item.id }}">{{ item.id }}</a>
          <span class="text-truncate">{{ item.title }}</span>
        </div>
        <form
          method="post"
          action="/tickets/{{ ticket.id }}/unlink"
          hx-post="/tickets/{{ ticket.id }}/unlink"
          hx-target="body"
        >
          <input type="hidden" name="other_ticket_id" value="{{ item.id }}">
          <button class="btn btn-link link-danger p-0 border-0" type="submit" title="Remove link">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-circle" viewBox="0 0 16 16">
              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
              <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
            </svg>
          </button>
        </form>
      </li>
      {% else %}
      <li class="list-group-item text-body-secondary">{{ _("No related tickets yet.") }}</li>
      {% endfor %}
    </ul>
  </div>
</div>
