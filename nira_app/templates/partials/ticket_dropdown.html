{% from "macros.html" import status_badge %}
{% if tickets %}
  {% for t in tickets %}
  <li>
    <button type="button" class="dropdown-item d-flex flex-column gap-1" onclick="selectTicket(this, '{{ t.id }}')">
      <div class="d-flex w-100 justify-content-between align-items-center">
        <strong class="text-primary">{{ t.id }}</strong>
        {{ status_badge(t.status) | safe }}
      </div>
      <div class="text-truncate text-body-secondary small">{{ t.title }}</div>
    </button>
  </li>
  {% endfor %}
{% else %}
  <li><span class="dropdown-item text-body-secondary text-center small py-3">No matching tickets</span></li>
{% endif %}
