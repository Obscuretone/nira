<div class="card shadow-sm mb-4">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="h5 mb-0">{{ _("Sub-tasks") }}</h2>
      <a href="/tickets/new?parent={{ ticket.id }}" class="btn btn-sm btn-outline-primary">Add Sub-task</a>
    </div>
    <ul class="list-group list-group-flush">
      {% for sub in sub_tasks %}
      <li class="list-group-item d-flex justify-content-between align-items-center gap-3">
        <div class="d-flex align-items-center gap-2 overflow-hidden">
          <a class="link-body-emphasis fw-semibold text-nowrap" href="/tickets/{{ sub.id }}">{{ sub.id }}</a>
          <span class="text-truncate">{{ sub.title }}</span>
        </div>
        <div>{{ status_badge(sub.status) | safe }}</div>
      </li>
      {% else %}
      <li class="list-group-item text-body-secondary">{{ _("No sub-tasks yet.") }}</li>
      {% endfor %}
    </ul>
  </div>
</div>
