<div class="card shadow-sm mb-4">
  <div class="card-header bg-transparent border-bottom-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
    <h2 class="h5 mb-0">{{ _("Attachments") }} <span class="badge text-bg-secondary rounded-pill ms-1">{{ attachments|length }}</span></h2>
  </div>
  <div class="card-body">
    {% if attachments %}
    <div class="list-group list-group-flush mb-3">
      {% for attachment in attachments %}
      <div class="list-group-item px-0 d-flex justify-content-between align-items-center border-bottom border-light">
        <div class="d-flex align-items-center overflow-hidden">
          <i class="bi bi-file-earmark me-2 text-body-secondary fs-5"></i>
          <a href="/tickets/{{ ticket.id }}/attachments/{{ urlencode(attachment.filename) }}" class="text-truncate" target="_blank" title="{{ attachment.filename }}">{{ attachment.filename }}</a>
        </div>
        <div class="text-body-secondary small ms-3 text-nowrap">
          {{ (attachment.file_size / 1024) | round(1) }} KB
        </div>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <form hx-post="/tickets/{{ ticket.id }}/attachments" hx-encoding="multipart/form-data" hx-target="body" class="d-flex gap-2 align-items-center">
      <input type="file" name="file" class="form-control form-control-sm" required>
      <button type="submit" class="btn btn-sm btn-outline-primary text-nowrap">
        <i class="bi bi-upload"></i> {{ _("Upload") }}
      </button>
    </form>
  </div>
</div>
